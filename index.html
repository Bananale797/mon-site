<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Site avec image locale</title>

    <!-- On relie le fichier CSS -->
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <h1>Mon image locale s'affiche !</h1>
    <p>Voici l’image téléchargée :</p>

    <!-- 
      Ici on utilise une image LOCALE.
      Cela veut dire que le fichier "image.jpg"
      se trouve dans le même dossier que index.html.
    -->
    <img src="image.jpg" alt="Montagne" class="image">

    <!-- Bouton avec un script -->
    <button onclick="alerte()">Clique ici</button>

    <!-- Fichier JavaScript relié -->
    <script src="script.js"></script>
  </body>
</html>
